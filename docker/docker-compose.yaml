services:
  postgres:
    image: postgres:16
    container_name: app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: #username here
      POSTGRES_PASSWORD: #password here
      POSTGRES_DB: #db name here
    ports:
    - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ../db:/sql
volumes:
  postgres_data: